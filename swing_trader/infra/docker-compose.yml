services:
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_admin -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        BUILD_ID: ${BUILD_ID:-dev}
    container_name: trading_dashboard
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: trading
      DB_USER: trading_reader
      DB_PASSWORD: ${POSTGRES_READER_PASSWORD:-reader_password_change_me}
      NEXT_PUBLIC_HEAT_CAP: "2.0"
      NEXT_PUBLIC_PORTFOLIO_STOP: "3.0"
      NODE_ENV: production
      SWING_TRADER_ENV: ${SWING_TRADER_ENV:-paper}
      IB_ACCOUNT_ID: ${IB_ACCOUNT_ID:-}
      IB_PORT: ${IB_PORT:-4002}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net

  atrss:
    profiles: ["atrss"]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: trading_atrss
    restart: unless-stopped
    command: ["python", "-m", "strategy"]
    env_file:
      - ../.env
    environment:
      RELAY_URL: "http://host.docker.internal:8001/events"
    volumes:
      - instrumentation_atrss:/app/instrumentation/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net

  akc_helix:
    profiles: ["akc_helix"]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: trading_akc_helix
    restart: unless-stopped
    command: ["python", "-m", "strategy_2"]
    env_file:
      - ../.env
    environment:
      RELAY_URL: "http://host.docker.internal:8001/events"
    volumes:
      - instrumentation_helix:/app/instrumentation/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net

  swing_breakout:
    profiles: ["swing_breakout"]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: trading_swing_breakout
    restart: unless-stopped
    command: ["python", "-m", "strategy_3"]
    env_file:
      - ../.env
    environment:
      RELAY_URL: "http://host.docker.internal:8001/events"
    volumes:
      - instrumentation_breakout:/app/instrumentation/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_net

  portfolio:
    profiles: ["portfolio"]
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: trading_portfolio
    restart: unless-stopped
    network_mode: host
    command: ["python", "main_multi.py"]
    env_file:
      - ../.env
    environment:
      RELAY_URL: "http://127.0.0.1:8001/events"
      IB_HOST: "127.0.0.1"
      DB_HOST: "127.0.0.1"
    volumes:
      - instrumentation_portfolio:/app/instrumentation/data

volumes:
  postgres_data:
  instrumentation_atrss:
  instrumentation_helix:
  instrumentation_breakout:
  instrumentation_portfolio:

networks:
  trading_net:
    driver: bridge
