services:
  strategy_iaric:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: stock_trader_strategy_iaric
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "strategy_iaric"]
    env_file:
      - ../.env
    environment:
      PYTHONUNBUFFERED: "1"
      IB_HOST: "127.0.0.1"
      IB_CLIENT_ID: ${IB_CLIENT_ID_IARIC:-31}
      STOCK_TRADER_PAPER_CAPITAL: ${STOCK_TRADER_PAPER_CAPITAL:-}
      STOCK_TRADER_DEPLOY_MODE: ${STOCK_TRADER_DEPLOY_MODE:-both}
      STOCK_TRADER_CAPITAL_ALLOCATION_IARIC_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_IARIC_PCT:-33.333333}
      STOCK_TRADER_CAPITAL_ALLOCATION_US_ORB_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_US_ORB_PCT:-33.333333}
      STOCK_TRADER_CAPITAL_ALLOCATION_ALCB_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_ALCB_PCT:-33.333334}
      INSTRUMENTATION_DATA_DIR: /app/instrumentation/data
      INSTRUMENTATION_RELAY_URL: "http://127.0.0.1:8001/events"
    volumes:
      - iaric_data:/app/data/strategy_iaric
      - iaric_instrumentation:/app/instrumentation/data

  strategy_orb:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: stock_trader_strategy_orb
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "strategy_orb"]
    env_file:
      - ../.env
    environment:
      PYTHONUNBUFFERED: "1"
      IB_HOST: "127.0.0.1"
      IB_CLIENT_ID: ${IB_CLIENT_ID_US_ORB:-32}
      STOCK_TRADER_PAPER_CAPITAL: ${STOCK_TRADER_PAPER_CAPITAL:-}
      STOCK_TRADER_DEPLOY_MODE: ${STOCK_TRADER_DEPLOY_MODE:-both}
      STOCK_TRADER_CAPITAL_ALLOCATION_IARIC_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_IARIC_PCT:-33.333333}
      STOCK_TRADER_CAPITAL_ALLOCATION_US_ORB_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_US_ORB_PCT:-33.333333}
      STOCK_TRADER_CAPITAL_ALLOCATION_ALCB_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_ALCB_PCT:-33.333334}
      INSTRUMENTATION_DATA_DIR: /app/instrumentation/data
      INSTRUMENTATION_RELAY_URL: "http://127.0.0.1:8001/events"
    volumes:
      - us_orb_data:/app/data/strategy_orb
      - us_orb_instrumentation:/app/instrumentation/data

  strategy_alcb:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: stock_trader_strategy_alcb
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "strategy_alcb"]
    env_file:
      - ../.env
    environment:
      PYTHONUNBUFFERED: "1"
      IB_HOST: "127.0.0.1"
      IB_CLIENT_ID: ${IB_CLIENT_ID_ALCB:-34}
      STOCK_TRADER_PAPER_CAPITAL: ${STOCK_TRADER_PAPER_CAPITAL:-}
      STOCK_TRADER_DEPLOY_MODE: ${STOCK_TRADER_DEPLOY_MODE:-both}
      STOCK_TRADER_CAPITAL_ALLOCATION_IARIC_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_IARIC_PCT:-33.333333}
      STOCK_TRADER_CAPITAL_ALLOCATION_US_ORB_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_US_ORB_PCT:-33.333333}
      STOCK_TRADER_CAPITAL_ALLOCATION_ALCB_PCT: ${STOCK_TRADER_CAPITAL_ALLOCATION_ALCB_PCT:-33.333334}
      INSTRUMENTATION_DATA_DIR: /app/instrumentation/data
      INSTRUMENTATION_RELAY_URL: "http://127.0.0.1:8001/events"
    volumes:
      - alcb_data:/app/data/strategy_alcb
      - alcb_instrumentation:/app/instrumentation/data

volumes:
  iaric_data:
  iaric_instrumentation:
  us_orb_data:
  us_orb_instrumentation:
  alcb_data:
  alcb_instrumentation:
